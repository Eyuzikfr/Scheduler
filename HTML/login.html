<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="/CSS/log in.css">
</head>
<body>
    <div class="container">
        <div class="form-section">
            <h2>Howdy,<br>Welcome Back!</h2>
            <form>
                <label for="username">User Name</label>
                <input type="text" id="username" placeholder="Enter Your Username" required>

                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter Your Password" required>
                
                    <!-- Forgot password link -->
                <div class="forgot-password">
                <a href="forgot-password.html">Forgot your password?</a>
                </div>
                
                <button type="submit" class="signup-button">Log In</button>
                
                <div class="social-signup">
                    <p>---OR---</p>
                    <p>log in with,<a href="https://accounts.google.com/o/oauth2/auth?client_id=YOUR_CLIENT_ID&redirect_uri=https://yourdomain.com/callback&response_type=code&scope=email%20profile&state=YOUR_STATE
                    " target="_blank"><img src="/images/google.webp" alt="Google"></a></p>
                </div>
                
            </form>
        </div>
        <div class="info-section">
            <h2>Uncomplicate your<br>social media presence...</h2>
            <div class="graphics">
                <div class="square white"></div>
                <div class="square gray"></div>
            </div>
            <div class="footer-links">
                <a href="help.html">Help</a>
                <a href="privacy-policy.html">Privacy</a>
                <a href="terms-and-conditions.html">Terms</a>
            </div>
        </div>
    </div>
</body>
</html>
